<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer Rounded Square Border resembling the 3D-Printer bed/frame -->
  <rect x="4" y="4" width="92" height="92" rx="14" fill="#11111b" stroke="#1e66f5" stroke-width="4.5"/>
  
  <!-- Outer Loop/Track of printer path -->
  <path d="M 12,18 L 88,18 L 88,78 L 12,78 Z" fill="none" stroke="#1e66f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner Loop representing print layers -->
  <path d="M 18,24 L 82,24 L 82,72 L 18,72 Z" fill="none" stroke="#1e66f5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- The Printer Gantry / Top Rail -->
  <line x1="18" y1="32" x2="82" y2="32" stroke="#1e66f5" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Extruder Carriage with nozzle head -->
  <path d="M 42,28 L 58,28 L 58,34 L 54,38 L 50,44 L 46,38 L 42,34 Z" fill="#11111b" stroke="#1e66f5" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Extrusion Nozzle Tip point -->
  <circle cx="50" cy="44" r="1" fill="#7287fd"/>
  
  <!-- The Printed 3D Cube / Object representing 'CAPA CERO' logo structure -->
  <!-- Top Face of the Cube -->
  <path d="M 50,47 L 62,54 L 50,61 L 38,54 Z" fill="none" stroke="#1e66f5" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Left Face of the Cube -->
  <path d="M 38,54 L 38,68 L 50,75 L 50,61 Z" fill="none" stroke="#1e66f5" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Right Face of the Cube -->
  <path d="M 50,61 L 50,75 L 62,68 L 62,54 Z" fill="none" stroke="#1e66f5" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Glowing core representing the printer nozzle heat -->
  <circle cx="50" cy="30" r="1.5" fill="#fab387"/>
</svg>
